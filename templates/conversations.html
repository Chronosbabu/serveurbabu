<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Conversations</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; }
.header { background:#007BFF; color:#fff; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
.conversation-list { max-width:600px; margin:20px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.conversation { display:flex; align-items:center; padding:10px; border-bottom:1px solid #eee; cursor:pointer; }
.conversation:last-child { border-bottom:none; }
.profile-pic { width:50px; height:50px; border-radius:50%; background:#ccc; margin-right:15px; }
.conversation-info { flex:1; }
.conversation-info h4 { margin:0; font-size:16px; }
.conversation-info p { margin:2px 0 0; color:#555; font-size:14px; }
</style>
</head>
<body>
<div class="header">Mes Conversations</div>
<div class="conversation-list">
    {% for conv in conversations %}
    <div class="conversation" onclick="window.location.href='/chat/{{ conv.username }}'">
        <div class="profile-pic"></div>
        <div class="conversation-info">
            <h4>{{ conv.username }}</h4>
            <p>{{ conv.last_msg }}</p>
        </div>
    </div>
    {% else %}
    <p style="text-align:center; padding:20px;">Aucune conversation pour l'instant.</p>
    {% endfor %}
</div>
</body>
</html>
