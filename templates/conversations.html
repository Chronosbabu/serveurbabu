<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Conversations</title>
<style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; }
    .header { background:#007BFF; color:#fff; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .conversation-list { max-width:600px; margin:20px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .conversation { display:flex; align-items:center; padding:10px; border-bottom:1px solid #eee; cursor:pointer; }
    .conversation:last-child { border-bottom:none; }
    .profile-pic { width:50px; height:50px; border-radius:50%; background:#ccc; margin-right:15px; }
    .conversation-info { flex:1; }
    .conversation-info h4 { margin:0; font-size:16px; }
    .conversation-info p { margin:2px 0 0; color:#555; font-size:14px; }
</style>
</head>
<body>
<div class="header">Mes Conversations</div>
<div class="conversation-list" id="conversation-list">
    <!-- Les conversations seront ajoutées ici dynamiquement -->
</div>

<script>
async function loadConversations() {
    try {
        const res = await fetch('/messages');
        const messages = await res.json();

        // Créer un objet unique pour chaque utilisateur avec qui il y a conversation
        const convs = {};
        messages.forEach(msg => {
            const other = msg.sender === "moi" ? msg.receiver : msg.sender;
            convs[other] = msg.content; // garder le dernier message
        });

        const listDiv = document.getElementById('conversation-list');
        listDiv.innerHTML = '';

        for (const user in convs) {
            const div = document.createElement('div');
            div.className = 'conversation';
            div.onclick = () => window.location.href = `chat.html?user=${encodeURIComponent(user)}`;

            div.innerHTML = `
                <div class="profile-pic"></div>
                <div class="conversation-info">
                    <h4>${user}</h4>
                    <p>${convs[user]}</p>
                </div>
            `;
            listDiv.appendChild(div);
        }

    } catch (err) {
        console.error("Erreur chargement conversations:", err);
    }
}

// Charger au démarrage
loadConversations();
</script>
</body>
</html>
