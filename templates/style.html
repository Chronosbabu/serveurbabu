<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHRONOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    .main-container { max-width: 800px; margin: auto; }
    .post { background: #fff; margin: 20px 0; border-radius: 12px; overflow: hidden; }
    .post img, .post video {
      width: 100%;
      max-height: 80vh;
      object-fit: cover;
      display: block;
      touch-action: pan-y pinch-zoom; /* défilement vertical */
    }
    .video-wrapper { position: relative; }
    .video-controls {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .video-controls.visible { opacity: 1; }
    .play-pause-btn {
      background: rgba(0,0,0,0.7);
      border: none;
      border-radius: 50%;
      width: 60px; height: 60px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      pointer-events: auto; /* corrigé */
    }
    .play-pause-btn i { color: white; font-size: 24px; }
    .video-error {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
    .video-error.visible { display: block; }
  </style>
</head>
<body data-username="{{ username }}">
  <div class="main-container" id="posts">
    {% for post in posts %}
    <div class="post">
      {% if post.type == "image" %}
      <img src="{{ url_for('uploaded_file', filename=post.file) }}" alt="image">
      {% elif post.type == "video" %}
      <div class="video-wrapper">
        <video src="{{ url_for('uploaded_file', filename=post.file) }}" preload="metadata" playsinline webkit-playsinline muted></video>
        <div class="video-controls">
          <button class="play-pause-btn"><i class="fas fa-play"></i></button>
        </div>
        <div class="video-error">Erreur de lecture</div>
      </div>
      {% endif %}
    </div>
    {% endfor %}
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const postsContainer = document.getElementById("posts");
      const videos = new Set();

      function initVideoControls(wrapper) {
        const video = wrapper.querySelector("video");
        const btn = wrapper.querySelector(".play-pause-btn");
        const controls = wrapper.querySelector(".video-controls");
        const errorBox = wrapper.querySelector(".video-error");

        if (!video) return;

        video.addEventListener("canplay", () => {
          btn.classList.add("ready");
        });

        video.addEventListener("error", () => {
          errorBox.classList.add("visible");
          controls.classList.remove("visible");
        });

        const togglePlay = () => {
          if (video.paused) {
            videos.forEach(v => v.pause()); // pause autres vidéos
            video.play().then(() => {
              btn.innerHTML = '<i class="fas fa-pause"></i>';
              controls.classList.add("visible");
              setTimeout(() => controls.classList.remove("visible"), 1500);
            });
          } else {
            video.pause();
            btn.innerHTML = '<i class="fas fa-play"></i>';
            controls.classList.add("visible");
          }
        };

        btn.addEventListener("click", togglePlay);
        video.addEventListener("click", togglePlay);

        videos.add(video);
      }

      document.querySelectorAll(".video-wrapper").forEach(initVideoControls);
    });
  </script>
</body>
</html>
