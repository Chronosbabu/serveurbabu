<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header>
    <h2>📢 Espace de Publication</h2>
</header>

<section class="upload-section">
    <form method="POST" enctype="multipart/form-data">
        <textarea name="description" placeholder="Écrivez une description..." required></textarea><br>
        <input type="file" name="file" accept="image/*,video/*" required>
        <button type="submit">Publier</button>
    </form>
</section>

<main class="scroll-box" id="posts">
    {% for post in posts %}
        <div class="post">
            <p class="description">{{ post.description }}</p>
            {% if post.type == "image" %}
                <img src="{{ url_for('uploaded_file', filename=post.file) }}" alt="image">
            {% elif post.type == "video" %}
                <video src="{{ url_for('uploaded_file', filename=post.file) }}" controls muted loop></video>
            {% endif %}
            <p class="date">Publié le {{ post.date }}</p>
        </div>
    {% endfor %}
</main>

<script>
// lecture automatique des vidéos visibles
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.play();
        } else {
            entry.target.pause();
        }
    });
}, {threshold: 0.6});

function observeVideos() {
    document.querySelectorAll('video').forEach(video => observer.observe(video));
}
observeVideos();

// fetch périodique pour charger les nouvelles publications
async function fetchPosts() {
    const res = await fetch('/get_posts');
    const posts = await res.json();
    const container = document.getElementById('posts');
    container.innerHTML = ""; // vider avant d'ajouter
    posts.forEach(post => {
        const div = document.createElement('div');
        div.className = "post";
        let media = '';
        if(post.type === "image") {
            media = `<img src="/uploads/${post.file}" alt="image">`;
        } else if(post.type === "video") {
            media = `<video src="/uploads/${post.file}" controls muted loop></video>`;
        }
        div.innerHTML = `<p class="description">${post.description}</p>${media}<p class="date">Publié le ${post.date}</p>`;
        container.appendChild(div);
    });
    observeVideos(); // observer nouvelles vidéos
}

// vérifier toutes les 5 secondes
setInterval(fetchPosts, 5000);
</script>
</body>
</html>
