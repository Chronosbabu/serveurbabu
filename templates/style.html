<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h2>📢 Espace de Publication</h2>
    </header>

    <section class="upload-section">
        <form method="POST" enctype="multipart/form-data">
            <textarea name="description" placeholder="Écrivez une description..." required></textarea><br>
            <input type="file" name="file" accept="image/*,video/*" required>
            <button type="submit">Publier</button>
        </form>
    </section>

    <main class="scroll-box">
        {% for post in posts %}
            <div class="post">
                <p class="description">{{ post.description }}</p>
                {% if post.type == "image" %}
                    <img src="{{ url_for('uploaded_file', filename=post.file) }}" alt="image">
                {% elif post.type == "video" %}
                    <video src="{{ url_for('uploaded_file', filename=post.file) }}" controls muted loop></video>
                {% endif %}
                <p class="date">Publié le {{ post.date }}</p>
            </div>
        {% endfor %}
    </main>

<script>
// Lecture automatique des vidéos quand elles sont visibles
const videos = document.querySelectorAll('video');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.play();
        } else {
            entry.target.pause();
        }
    });
}, {threshold: 0.6});

videos.forEach(video => observer.observe(video));
</script>
</body>
</html>
