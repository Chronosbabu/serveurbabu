<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paris en Direct</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
    header { background:#e91e63; color:#fff; padding:16px; text-align:center; font-size:1.4em; }
    .container { max-width:720px; margin:20px auto; padding:0 16px; }
    .match-card { background:#fff; border-radius:14px; box-shadow:0 3px 8px rgba(0,0,0,0.12);
                  padding:16px; margin-bottom:14px; display:flex; align-items:center;
                  justify-content:space-between; }
    .teams { font-weight:600; font-size:1.1em; }
    .btn { padding:10px 16px; border:none; border-radius:10px; background:#e91e63;
           color:#fff; cursor:pointer; font-weight:600; transition:0.2s; }
    .btn:hover { background:#b0003a; }
  </style>
  <script src="//cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
  <header>⚽ Matches disponibles</header>

  <div style="text-align:center; margin:10px;">
    <input type="text" id="username" placeholder="Nom utilisateur">
    <input type="password" id="password" placeholder="Mot de passe du compte principal">
    <button onclick="chargerMatches()">Charger Matchs</button>
  </div>

  <div class="container" id="matchesList"></div>

  <script>
    const BASE_URL = "";
    const socket = io();

    async function chargerMatches() {
      const user = document.getElementById("username").value.trim();
      const pwd = document.getElementById("password").value.trim();
      if (!user || !pwd) return alert("Entrez votre nom et mot de passe");

      try {
        const res = await fetch(`${BASE_URL}/matches/list`);
        const matches = await res.json();
        const list = document.getElementById("matchesList");
        list.innerHTML = "";
        matches.forEach(m => afficherMatch(m));
      } catch (e) {
        console.error("Erreur matches:", e);
      }
    }

    function afficherMatch(match) {
      const card = document.createElement("div");
      card.className = "match-card";
      card.innerHTML = `
        <div class="teams">${match.equipe1} vs ${match.equipe2}</div>
        <button class="btn" onclick='parier(${JSON.stringify(match)})'>Parier</button>
      `;
      document.getElementById("matchesList").appendChild(card);
    }

    async function parier(match) {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!username || !password) return alert("Nom et mot de passe requis");

      const choix = prompt(`Choisissez :
1 = ${match.equipe1}
2 = ${match.equipe2}
3 = Match nul`);
      if (!["1","2","3"].includes(choix)) return alert("Choix invalide.");
      const equipe_choisie = choix==="1"?match.equipe1:choix==="2"?match.equipe2:"nul";

      const deviseChoix = prompt("Devise : 1=Francs, 2=Dollars");
      if (!["1","2"].includes(deviseChoix)) return alert("Devise invalide.");
      const devise = deviseChoix==="1"?"francs":"dollars";

      const montant = parseInt(prompt("Montant à parier :"));
      if (isNaN(montant) || montant<=0) return alert("Montant invalide.");

      const res = await fetch(`${BASE_URL}/pari`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          username, password, match_id: match.id,
          devise, montant, equipe_choisie
        })
      });
      const data = await res.json();
      alert(data.message);
    }

    // SocketIO updates
    socket.on("new_match", match => afficherMatch(match));
    socket.on("new_bet", data => console.log("Nouvelle mise:", data));
  </script>
</body>
</html>
