<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paris en Direct</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #e91e63;
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 1.4em;
    }
    .container {
      max-width: 720px;
      margin: 20px auto;
      padding: 0 16px;
    }
    .match-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
      padding: 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .teams {
      font-weight: 600;
      font-size: 1.1em;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #e91e63;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn:hover {
      background: #b0003a;
    }
  </style>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
  <header>
    ⚽ Matches disponibles
  </header>

  <div class="container" id="matchesList">
    <!-- Matches injectés ici -->
  </div>

  <script>
    const socket = io();
    let soldeFrancs = 0;
    let soldeDollars = 0;
    let bankConnected = false;

    // Connexion bancaire obligatoire
    async function connecterBanque() {
      let pwd = prompt("Entrez le mot de passe de votre compte bancaire :");
      if (!pwd) return false;

      const res = await fetch("/compte/ouvrir", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pwd })
      });
      const data = await res.json();
      if (data.success) {
        bankConnected = true;
        soldeFrancs = data.francs;
        soldeDollars = data.dollars;
        alert("Connexion bancaire réussie ✅\nFrancs: " + soldeFrancs + " | Dollars: " + soldeDollars);
        return true;
      } else {
        alert("❌ " + (data.message || "Mot de passe incorrect"));
        return false;
      }
    }

    // Afficher un match
    function afficherMatch(match) {
      const card = document.createElement("div");
      card.className = "match-card";
      card.innerHTML = `
        <div class="teams">${match.equipe1} vs ${match.equipe2}</div>
        <button class="btn" onclick='parier(${JSON.stringify(match)})'>Parier</button>
      `;
      document.getElementById("matchesList").appendChild(card);
    }

    // Charger les matches depuis le serveur
    async function chargerMatches() {
      try {
        const res = await fetch("/matches/list");
        const matches = await res.json();
        const list = document.getElementById("matchesList");
        list.innerHTML = "";
        matches.forEach(m => afficherMatch(m));
      } catch (e) {
        console.error("Erreur matches:", e);
      }
    }

    // Processus de pari façon USSD
    async function parier(match) {
      try {
        // Vérifier si compte connecté
        if (!bankConnected) {
          const ok = await connecterBanque();
          if (!ok) return;
        }

        // Étape 1 : choix équipe
        const choix = prompt(`Choisissez le vainqueur :
1 = ${match.equipe1}
2 = ${match.equipe2}
3 = Match nul`);
        if (!["1","2","3"].includes(choix)) return alert("Choix invalide.");

        // Étape 2 : devise
        const deviseChoix = prompt("Choisissez la devise :\n1 = Francs\n2 = Dollars");
        if (!["1","2"].includes(deviseChoix)) return alert("Devise invalide.");
        const devise = deviseChoix === "1" ? "francs" : "dollars";

        // Étape 3 : montant
        const montant = parseFloat(prompt("Entrez le montant à parier :"));
        if (isNaN(montant) || montant <= 0) return alert("Montant invalide.");

        // Vérification côté client
        if (devise === "francs" && montant > soldeFrancs) {
          return alert("Solde insuffisant en Francs.");
        }
        if (devise === "dollars" && montant > soldeDollars) {
          return alert("Solde insuffisant en Dollars.");
        }

        // Étape 4 : confirmation avec mot de passe bancaire
        const pwd = prompt("Confirmez avec votre mot de passe bancaire :");
        if (!pwd) return alert("Mot de passe requis.");

        // Envoi au serveur
        const pari = {
          match_id: match.id,
          choix: parseInt(choix),
          devise: devise,
          montant: montant,
          password: pwd
        };

        const res = await fetch("/parier", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(pari)
        });
        const data = await res.json();

        if (data.success) {
          alert("✅ Pari confirmé avec succès !");
          if (devise === "francs") soldeFrancs = data.solde;
          else soldeDollars = data.solde;
        } else {
          alert("❌ " + (data.message || "Erreur lors du pari"));
        }
      } catch (err) {
        console.error("Erreur pari:", err);
        alert("Erreur lors du pari.");
      }
    }

    // Socket : nouveaux matches en direct
    socket.on("new_match", m => afficherMatch(m));

    // Init
    chargerMatches();
  </script>
</body>
</html>
