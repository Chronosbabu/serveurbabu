<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pari</title>
<style>
body { font-family: Arial; padding: 20px; }
input, button { margin: 5px; padding: 5px; }
</style>
</head>
<body>
<h2>Pari</h2>

<h3>Publier Match</h3>
<label>Équipe 1 :</label><input id="eq1"><br>
<label>Équipe 2 :</label><input id="eq2"><br>
<button onclick="publierMatch()">Publier Match</button>

<h3>Publier Résultat</h3>
<label>Match ID :</label><input id="match_id"><br>
<label>Résultat :</label><input id="resultat"><br>
<button onclick="publierResultat()">Publier Résultat</button>

<p id="msg"></p>

<script>
const BASE_URL = "http://127.0.0.1:5000";

function publierMatch(){
    const eq1 = document.getElementById("eq1").value;
    const eq2 = document.getElementById("eq2").value;
    fetch(`${BASE_URL}/matches/add`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({equipe1: eq1, equipe2: eq2})
    }).then(r => r.json()).then(d => afficher(d.message));
}

function publierResultat(){
    const match_id = document.getElementById("match_id").value || null;
    const resultat = document.getElementById("resultat").value;
    fetch(`${BASE_URL}/resultat`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({match_id, resultat})
    }).then(r => r.json()).then(d => afficher(d.message));
}

function afficher(msg){ document.getElementById("msg").innerText = msg; }
</script>
</body>
</html>
