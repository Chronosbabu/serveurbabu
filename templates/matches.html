<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Matches</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #fafafa;
    }
    header {
      background: #e91e63;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    .match-card {
      background: #fff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .match-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .match-info h3 {
      margin: 0;
    }
    .btn-parier {
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: #e91e63;
      color: #fff;
      cursor: pointer;
    }
    .btn-parier:hover {
      background: #b0003a;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mes Matches</h1>
  </header>

  <div class="container" id="matchesList">
    <!-- Les matches seront injectés ici -->
  </div>

  <script>
    // Exemple de matches reçus du serveur
    const matches = [
      { equipe1: "Real Madrid", equipe2: "Barcelone" },
      { equipe1: "PSG", equipe2: "Marseille" },
      { equipe1: "Milan AC", equipe2: "Inter Milan" }
    ];

    // Exemple de solde utilisateur (normalement ça vient du serveur)
    let soldeFrancs = 10000;
    let soldeDollars = 50;

    function afficherMatches() {
      const list = document.getElementById("matchesList");
      list.innerHTML = "";
      matches.forEach((m, index) => {
        const card = document.createElement("div");
        card.className = "match-card";
        card.innerHTML = `
          <div class="match-info">
            <h3>${m.equipe1} vs ${m.equipe2}</h3>
          </div>
          <button class="btn-parier" onclick="parier(${index})">Parier</button>
        `;
        list.appendChild(card);
      });
    }

    function parier(index) {
      const match = matches[index];

      // 1. Choix de l'équipe gagnante
      const choix = prompt(
        `Sur qui pariez-vous pour le match ${match.equipe1} vs ${match.equipe2} ?
1 = ${match.equipe1}
2 = ${match.equipe2}
3 = Match nul`
      );
      if (!choix || !["1","2","3"].includes(choix)) {
        alert("Choix invalide.");
        return;
      }

      // 2. Choix devise
      const devise = prompt("Choisissez la devise :\n1 = Francs\n2 = Dollars");
      if (!devise || !["1","2"].includes(devise)) {
        alert("Devise invalide.");
        return;
      }

      // 3. Montant
      const montant = parseFloat(prompt("Entrez le montant à parier :"));
      if (isNaN(montant) || montant <= 0) {
        alert("Montant invalide.");
        return;
      }

      // 4. Vérification du solde
      if (devise === "1") { // Francs
        if (montant > soldeFrancs) {
          alert("Solde insuffisant en Francs.");
          return;
        }
        soldeFrancs -= montant;
        alert(`Pari effectué avec succès ! Nouveau solde Francs : ${soldeFrancs}`);
      } else { // Dollars
        if (montant > soldeDollars) {
          alert("Solde insuffisant en Dollars.");
          return;
        }
        soldeDollars -= montant;
        alert(`Pari effectué avec succès ! Nouveau solde Dollars : ${soldeDollars}`);
      }

      // Ici on envoie au serveur les infos du pari
      const pari = {
        match: match,
        choix: choix,
        devise: devise === "1" ? "Francs" : "Dollars",
        montant: montant
      };
      console.log("Pari envoyé au serveur :", pari);
      // fetch("/parier", { method: "POST", body: JSON.stringify(pari) }) etc.
    }

    afficherMatches();
  </script>
</body>
</html>
