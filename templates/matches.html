<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Matches</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #fafafa;
    }
    header {
      background: #e91e63;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    .match-card {
      background: #fff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .match-info {
      display: flex;
      align-items: center;
    }
    .match-info img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-right: 15px;
    }
    .match-info h3 {
      margin: 0;
    }
    .btn-message {
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: #e91e63;
      color: #fff;
      cursor: pointer;
    }
    .btn-message:hover {
      background: #b0003a;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mes Matches</h1>
  </header>

  <div class="container" id="matchesList">
    <!-- Les matches seront injectés ici -->
  </div>

  <script>
    const matches = [
      { nom: "Alice", photo: "https://via.placeholder.com/60", msg: "Salut Alice !" },
      { nom: "Bob", photo: "https://via.placeholder.com/60", msg: "Coucou Bob !" },
      { nom: "Clara", photo: "https://via.placeholder.com/60", msg: "Hello Clara !" }
    ];

    function afficherMatches() {
      const list = document.getElementById("matchesList");
      list.innerHTML = "";
      matches.forEach(m => {
        const card = document.createElement("div");
        card.className = "match-card";
        card.innerHTML = `
          <div class="match-info">
            <img src="${m.photo}" alt="${m.nom}">
            <h3>${m.nom}</h3>
          </div>
          <button class="btn-message" onclick="envoyerMessage('${m.nom}', '${m.msg}')">Message</button>
        `;
        list.appendChild(card);
      });
    }

    function envoyerMessage(nom, msg) {
      alert("Message envoyé à " + nom + " : " + msg);
    }

    afficherMatches();
  </script>
</body>
</html>
