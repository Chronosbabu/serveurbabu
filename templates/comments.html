<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Commentaires</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="main-container">
    <header>
        <h2>💬 Commentaires</h2>
        <p>
            <a href="{{ url_for('index') }}">⬅ Retour aux publications</a>
        </p>
    </header>

    <main class="scroll-box">
        {% for comment in post.comments %}
        <div class="comment">
            {% if comment.avatar %}
            <img src="{{ url_for('avatar_file', filename=comment.avatar) }}" alt="avatar" class="avatar-comment" />
            {% else %}
            <div class="avatar-fallback">{{ comment.username[:1]|upper }}</div>
            {% endif %}
            <div class="comment-content">
                <p><strong>{{ comment.username }}</strong></p>
                <p>{{ comment.content }}</p>
                <small>{{ comment.date }}</small>
            </div>
        </div>
        {% endfor %}
    </main>

    <section class="comment-form">
        <form method="POST">
            <textarea name="comment" placeholder="Écrire un commentaire..." required></textarea><br />
            <button type="submit">Commenter</button>
        </form>
    </section>
</div>
</body>
</html>
