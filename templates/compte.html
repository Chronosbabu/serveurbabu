<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Compte</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
    header { background:#6200ea; color:#fff; padding:15px; text-align:center; }
    .container { padding:20px; }
    .profile-card { background:#fff; padding:20px; border-radius:12px;
                    box-shadow:0 2px 6px rgba(0,0,0,0.15); text-align:center;
                    max-width:400px; margin:auto; }
    .btn { display:inline-block; margin-top:15px; padding:10px 20px;
           border:none; border-radius:8px; background:#6200ea; color:#fff;
           cursor:pointer; }
    .btn:hover { background:#4b00b5; }
    .solde { margin-top:20px; font-weight:bold; font-size:1.2em; }
  </style>
  <script src="//cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
  <header><h1>Mon Compte</h1></header>

  <div class="container">
    <div class="profile-card">
      <h2 id="usernameDisplay">Utilisateur</h2>
      <div id="solde-box" style="display:none;">
        <p class="solde">Francs : <span id="francs">0</span></p>
        <p class="solde">Dollars : <span id="dollars">0</span></p>
      </div>

      <input type="text" id="usernameInput" placeholder="Nom utilisateur"><br><br>
      <input type="password" id="passwordInput" placeholder="Mot de passe du compte principal"><br><br>
      <button class="btn" onclick="ouvrirCompte()">Ouvrir mon compte</button>
    </div>
  </div>

  <script>
    const BASE_URL = "";
    const socket = io();

    async function ouvrirCompte() {
      const username = document.getElementById("usernameInput").value.trim();
      const password = document.getElementById("passwordInput").value.trim();
      if (!username || !password) return alert("Nom et mot de passe requis");

      const res = await fetch(`${BASE_URL}/compte/ouvrir`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({username, password})
      });
      const data = await res.json();
      if (data.success) {
        updateAffichage(username, data.francs, data.dollars);
        alert("Compte ouvert ou vérifié ✅");
      } else {
        alert(data.message);
      }
    }

    function updateAffichage(user, francs, dollars) {
      document.getElementById("usernameDisplay").innerText = user;
      document.getElementById("francs").innerText = francs;
      document.getElementById("dollars").innerText = dollars;
      document.getElementById("solde-box").style.display = "block";
    }

    socket.on("account_update", data => {
      if (document.getElementById("usernameDisplay").innerText === data.username) {
        updateAffichage(data.username, data.francs, data.dollars);
      }
    });
  </script>
</body>
</html>
