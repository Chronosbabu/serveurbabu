<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Compte</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
    header { background:#6200ea; color:#fff; padding:15px; text-align:center; }
    .container { padding:20px; }
    .profile-card { background:#fff; padding:20px; border-radius:12px;
                    box-shadow:0 2px 6px rgba(0,0,0,0.15); text-align:center;
                    max-width:400px; margin:auto; }
    .profile-card img { width:100px; height:100px; border-radius:50%; object-fit:cover; }
    .profile-card h2 { margin:10px 0 5px; }
    .btn { display:inline-block; margin-top:15px; padding:10px 20px;
           border:none; border-radius:8px; background:#6200ea; color:#fff;
           cursor:pointer; }
    .btn:hover { background:#4b00b5; }
    .solde { margin-top:20px; font-weight:bold; font-size:1.2em; }
  </style>
</head>
<body>
  <header>
    <h1>Mon Compte</h1>
  </header>

  <div class="container">
    <div class="profile-card">
      <img src="https://via.placeholder.com/100" alt="Photo de profil">
      <h2 id="usernameDisplay">Utilisateur</h2>

      <!-- Zone solde -->
      <div id="solde-box" style="display:none;">
        <p class="solde">Francs : <span id="francs">0</span></p>
        <p class="solde">Dollars : <span id="dollars">0</span></p>
      </div>

      <input type="text" id="usernameInput" placeholder="Nom utilisateur">
      <button class="btn" onclick="ouvrirCompte()">Ouvrir mon compte</button>
    </div>
  </div>

  <script>
    const BASE_URL = "";

    async function ouvrirCompte() {
      const user = document.getElementById("usernameInput").value.trim();
      if (!user) return alert("Entrez un nom d'utilisateur");

      const res = await fetch(`${BASE_URL}/compte/verifier/${user}`);
      if (res.status === 404) {
        // Ajouter automatiquement
        const addRes = await fetch(`${BASE_URL}/compte/ajouter/${user}`);
        const d = await addRes.json();
        alert(d.message);
        updateAffichage(user, d.solde);
      } else {
        const data = await res.json();
        alert("Utilisateur trouvé ✅");
        updateAffichage(user, data.solde);
      }
    }

    function updateAffichage(user, solde) {
      document.getElementById("usernameDisplay").innerText = user;
      document.getElementById("francs").innerText = solde.francs;
      document.getElementById("dollars").innerText = solde.dollars;
      document.getElementById("solde-box").style.display = "block";
    }
  </script>
</body>
</html>
