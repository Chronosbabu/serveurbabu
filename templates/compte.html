
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compte</title>
<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 5px; margin: 5px; }
</style>
</head>
<body>
<h2>Gestion Compte</h2>

<label>Nom utilisateur :</label>
<input id="username" type="text">
<button onclick="verifierUser()">Vérifier / Ajouter</button><br>

<label>Francs :</label>
<input id="francs" type="number" value="0"><br>
<label>Dollars :</label>
<input id="dollars" type="number" value="0"><br>
<button onclick="faireDepot()">Déposer</button>

<p id="message"></p>

<script>
const BASE_URL = "http://127.0.0.1:5000";

function verifierUser() {
    const user = document.getElementById("username").value;
    fetch(`${BASE_URL}/compte/verifier/${user}`)
        .then(r => r.json())
        .then(data => {
            if(data.exists){
                afficher("Utilisateur trouvé ✅");
            } else {
                // Ajouter automatiquement
                fetch(`${BASE_URL}/compte/ajouter/${user}`)
                .then(r => r.json())
                .then(d => afficher(d.message));
            }
        });
}

function faireDepot() {
    const user = document.getElementById("username").value;
    const francs = parseInt(document.getElementById("francs").value) || 0;
    const dollars = parseInt(document.getElementById("dollars").value) || 0;

    fetch(`${BASE_URL}/compte/depot`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({username: user, francs, dollars})
    })
    .then(r => r.json())
    .then(d => afficher(d.message));
}

function afficher(msg) {
    document.getElementById("message").innerText = msg;
}
</script>
</body>
</html>
