<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Compte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #6200ea;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .profile-card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 400px;
      margin: auto;
    }
    .profile-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }
    .profile-card h2 {
      margin: 10px 0 5px;
    }
    .profile-card p {
      color: #555;
    }
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #6200ea;
      color: #fff;
      cursor: pointer;
    }
    .btn:hover {
      background: #4b00b5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mon Compte</h1>
  </header>

  <div class="container">
    <div class="profile-card">
      <img id="profilePic" src="https://via.placeholder.com/100" alt="Photo de profil">
      <h2 id="username">Utilisateur</h2>
      <p id="bio">Ceci est ma bio</p>
      <button class="btn" onclick="changerBio()">Changer Bio</button>
    </div>
  </div>

  <script>
    function changerBio() {
      let nouvelleBio = prompt("Entrez une nouvelle bio :");
      if (nouvelleBio) {
        document.getElementById("bio").innerText = nouvelleBio;
      }
    }
  </script>
</body>
</html>
