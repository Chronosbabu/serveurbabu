<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compte</title>
<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 5px; margin: 5px; }
input[readonly] { background-color: #f0f0f0; }
</style>
</head>
<body>
<h2>Gestion Compte</h2>

<label>Nom utilisateur :</label>
<input id="username" type="text">
<button onclick="verifierUser()">Vérifier / Ajouter</button><br>

<label>Francs :</label>
<input id="francs" type="number" value="0" readonly><br>
<label>Dollars :</label>
<input id="dollars" type="number" value="0" readonly><br>

<p id="message"></p>
<p id="solde"></p>

<script>
const BASE_URL = "http://127.0.0.1:5000";

function verifierUser() {
    const user = document.getElementById("username").value;
    if (!user) return afficher("Entrez un nom d'utilisateur");
    
    fetch(`${BASE_URL}/compte/verifier/${user}`)
        .then(r => {
            if(r.status===404) return {exists:false};
            return r.json();
        })
        .then(data => {
            if(data.exists){
                afficher("Utilisateur trouvé ✅");
                updateSolde(user);
            } else {
                fetch(`${BASE_URL}/compte/ajouter/${user}`)
                .then(r => r.json())
                .then(d => {
                    afficher(d.message);
                    updateSolde(user);
                });
            }
        })
        .catch(err => afficher("Erreur serveur : " + err));
}

function updateSolde(user){
    fetch(`${BASE_URL}/compte/verifier/${user}`)
    .then(r => r.json())
    .then(data => {
        if(data.exists){
            fetch(`${BASE_URL}/compte/depot`, {  // Appel simulé pour récupérer le solde
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({username: user, francs: 0, dollars: 0})
            })
            .then(r => r.json())
            .then(d => {
                if(d.solde){
                    document.getElementById("francs").value = d.solde.francs;
                    document.getElementById("dollars").value = d.solde.dollars;
                }
            });
        }
    });
}

function afficher(msg){
    document.getElementById("message").innerText = msg;
}
</script>
</body>
</html>
