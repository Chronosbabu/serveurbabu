<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compte</title>
<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 5px; margin: 5px; }
input[readonly] { background-color: #f0f0f0; }
</style>
</head>
<body>
<h2>Gestion Compte</h2>

<label>Nom utilisateur :</label>
<input id="username" type="text">
<button onclick="verifierUser()">Vérifier / Ajouter</button><br>

<label>Francs :</label>
<input id="francs" type="number" value="0" readonly><br>
<label>Dollars :</label>
<input id="dollars" type="number" value="0" readonly><br>

<p id="message"></p>

<script>
const BASE_URL = ""  // Flask sert les fichiers directement, donc chemin relatif

function verifierUser() {
    const user = document.getElementById("username").value;
    if (!user) return afficher("Entrez un nom d'utilisateur");
    
    fetch(`${BASE_URL}/compte/verifier/${user}`)
        .then(r => {
            if(r.status===404) return {exists:false};
            return r.json();
        })
        .then(data => {
            if(data.exists){
                afficher("Utilisateur trouvé ✅");
                updateSolde(data.solde);
            } else {
                fetch(`${BASE_URL}/compte/ajouter/${user}`)
                .then(r => r.json())
                .then(d => {
                    afficher(d.message);
                    updateSolde(d.solde);
                });
            }
        })
        .catch(err => afficher("Erreur serveur : " + err));
}

function updateSolde(solde){
    if(solde){
        document.getElementById("francs").value = solde.francs;
        document.getElementById("dollars").value = solde.dollars;
    }
}

function afficher(msg){
    document.getElementById("message").innerText = msg;
}
</script>
</body>
</html>
