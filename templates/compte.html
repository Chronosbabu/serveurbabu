<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compte</title>
<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 5px; margin: 5px; }
input[readonly] { background-color: #eee; }
</style>
</head>
<body>
<h2>Gestion Compte</h2>

<label>Nom utilisateur :</label>
<input id="username" type="text">
<button onclick="verifierUser()">Vérifier / Ajouter</button><br>

<label>Francs :</label>
<input id="francs" type="number" value="0" readonly><br>
<label>Dollars :</label>
<input id="dollars" type="number" value="0" readonly><br>

<p id="message"></p>
<p id="solde"></p>

<script>
const BASE_URL = "http://127.0.0.1:5000";

function verifierUser() {
    const user = document.getElementById("username").value.trim();
    if(!user) {
        afficher("Veuillez entrer un nom utilisateur.");
        return;
    }

    fetch(`${BASE_URL}/compte/verifier/${user}`)
        .then(r => r.json())
        .then(data => {
            if(data.exists){
                afficher("Utilisateur trouvé ✅");
                mettreAJourSolde(data.solde);
            } else {
                fetch(`${BASE_URL}/compte/ajouter/${user}`)
                .then(r => r.json())
                .then(d => {
                    afficher(d.message);
                    if(d.solde) mettreAJourSolde(d.solde);
                });
            }
        })
        .catch(err => afficher("Erreur serveur : " + err));
}

function mettreAJourSolde(solde) {
    document.getElementById("francs").value = solde.francs || 0;
    document.getElementById("dollars").value = solde.dollars || 0;
    document.getElementById("solde").innerText = 
        `Solde actuel : ${solde.francs} Francs, ${solde.dollars} Dollars`;
}

function afficher(msg) {
    document.getElementById("message").innerText = msg;
}
</script>
</body>
</html>
