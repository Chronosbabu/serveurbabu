<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #f2f2f2;
    }
    #messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .message {
        max-width: 70%;
        padding: 8px 12px;
        border-radius: 15px;
        word-wrap: break-word;
    }
    .from-me {
        align-self: flex-end;
        background-color: #4CAF50;
        color: white;
    }
    .from-them {
        align-self: flex-start;
        background-color: #e0e0e0;
        color: black;
    }
    #inputBox {
        display: flex;
        padding: 10px;
        background: #fff;
        border-top: 1px solid #ccc;
    }
    #messageInput {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 16px;
    }
    #sendBtn {
        margin-left: 10px;
        padding: 10px 20px;
        border: none;
        border-radius: 20px;
        background-color: #4CAF50;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }
    #sendBtn:hover {
        background-color: #45a049;
    }
</style>
</head>
<body>

<div id="messages"></div>

<div id="inputBox">
    <input type="text" id="messageInput" placeholder="Tapez un message...">
    <button id="sendBtn">Envoyer</button>
</div>

<script>
const input = document.getElementById('messageInput');
const btn = document.getElementById('sendBtn');
const messagesDiv = document.getElementById('messages');

function scrollMessages() {
    requestAnimationFrame(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; });
}

async function sendMessage() {
    const text = input.value.trim();
    if(!text) return;

    // ajout local immédiat
    const div = document.createElement('div');
    div.className = 'message from-me';
    div.textContent = text;
    messagesDiv.appendChild(div);
    scrollMessages();

    input.value = '';
    input.focus();

    // envoyer au serveur
    try {
        const res = await fetch("/send_message", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ recipient: "{{ chat_user }}", message: text })
        });
        const result = await res.json();
        if(!result.success) alert("Impossible d'envoyer le message.");
    } catch(e) { alert("Erreur réseau."); }
}

btn.addEventListener('click', sendMessage);
input.addEventListener('keypress', e => {
    if(e.key === 'Enter'){ e.preventDefault(); sendMessage(); }
});

input.addEventListener('focus', scrollMessages);
window.addEventListener('resize', scrollMessages);
scrollMessages();
</script>

</body>
</html>
