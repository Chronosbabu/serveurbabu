<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; display:flex; flex-direction:column; height:100vh; }
    .header { background:#007BFF; color:#fff; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .messages { flex:1; overflow-y:auto; padding:15px; }
    .message { margin-bottom:10px; padding:10px; border-radius:8px; max-width:70%; }
    .from-me { background:#DCF8C6; margin-left:auto; }
    .from-other { background:#fff; margin-right:auto; }
    .input-box { display:flex; padding:10px; background:#fff; border-top:1px solid #ccc; }
    .input-box input { flex:1; padding:10px; border:1px solid #ccc; border-radius:5px; margin-right:10px; }
    .input-box button { padding:10px 15px; background:#007BFF; color:#fff; border:none; border-radius:5px; cursor:pointer; }
</style>
</head>
<body>
<div class="header" id="chat-header">Chat</div>
<div class="messages" id="messages"></div>
<div class="input-box">
    <input type="text" id="message-input" placeholder="Écrire un message...">
    <button onclick="sendMessage()">Envoyer</button>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const otherUser = urlParams.get('user');
document.getElementById('chat-header').innerText = `Chat avec ${otherUser}`;

async function loadMessages() {
    try {
        const res = await fetch('/messages');
        const messages = await res.json();
        const chatDiv = document.getElementById('messages');
        chatDiv.innerHTML = '';
        messages.forEach(msg => {
            if (msg.sender === "moi" && msg.receiver === otherUser || msg.sender === otherUser && msg.receiver === "moi") {
                const div = document.createElement('div');
                div.className = 'message ' + (msg.sender === "moi" ? 'from-me' : 'from-other');
                div.textContent = msg.content;
                chatDiv.appendChild(div);
            }
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
    } catch(err) { console.error(err); }
}

// Envoyer un message
async function sendMessage() {
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    if (!content) return;

    try {
        await fetch('/messages', {
            method:'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({sender:'moi', receiver:otherUser, content})
        });
        input.value = '';
        loadMessages();
    } catch(err) { console.error(err); }
}

// Rafraîchissement toutes les 1s
setInterval(loadMessages, 1000);
loadMessages();
</script>
</body>
</html>
