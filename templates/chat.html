
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat avec {{ chat_user }}</title>
<style>
body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #e5ddd5;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

/* Header */
.header {
    background: #075E54;
    color: #fff;
    text-align: center;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    flex-shrink: 0;
}

/* Container principal */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
}

/* Zone scrollable */
.messages {
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-sizing: border-box;
}

/* Messages */
.message {
    padding: 10px 14px;
    border-radius: 20px;
    max-width: 75%;
    line-height: 1.4;
    font-size: 15px;
    word-wrap: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    animation: fadeIn 0.2s ease;
}
.from-me { background: #dcf8c6; align-self: flex-end; }
.from-other { background: #fff; align-self: flex-start; }

/* Aucun message */
.no-messages { text-align: center; color: #888; margin-top: 20px; }

/* Input fixe */
.input-box {
    display: flex;
    padding: 10px;
    background: #fff;
    border-top: 1px solid #ccc;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    gap: 8px;
    box-sizing: border-box;
    z-index: 100;
}

.input-box input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 25px;
    font-size: 15px;
}

.input-box button {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: #25D366;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
}
.input-box button:hover { background: #128C7E; }

/* Animation */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Scrollbar */
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.2); border-radius: 3px; }

/* Responsive */
@media screen and (max-width: 600px) {
    .message { font-size: 14px; max-width: 85%; }
    .input-box input { font-size: 14px; }
    .input-box button { width: 40px; height: 40px; font-size: 16px; }
    .header { font-size: 18px; padding: 12px; }
}
</style>
</head>
<body data-username="{{ session['username'] }}">
<div class="header">Chat avec {{ chat_user }}</div>

<div class="chat-container">
    <div class="messages" id="messages">
        {% for msg in messages %}
        <div class="message {% if msg.sender == session['username'] %}from-me{% else %}from-other{% endif %}">
            {{ msg.text }}
        </div>
        {% else %}
        <p class="no-messages">Aucun message pour le moment.</p>
        {% endfor %}
    </div>
</div>

<div class="input-box">
    <input type="text" id="messageInput" placeholder="Écrire un message..." required>
    <button id="sendBtn">➤</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const input = document.getElementById('messageInput');
const btn = document.getElementById('sendBtn');
const messagesDiv = document.getElementById('messages');
const currentUser = document.body.dataset.username;
const chatUser = "{{ chat_user }}";

// Ajuster la hauteur des messages pour ne pas passer derrière l'input
function adjustMessagesHeight() {
    const headerHeight = document.querySelector('.header').offsetHeight;
    const inputHeight = document.querySelector('.input-box').offsetHeight;
    messagesDiv.style.height = `calc(100vh - ${headerHeight + inputHeight}px)`;
}
window.addEventListener('resize', adjustMessagesHeight);
adjustMessagesHeight();

// Détecter ouverture clavier mobile
input.addEventListener('focus', adjustMessagesHeight);
input.addEventListener('blur', adjustMessagesHeight);

// Socket
const socket = io();
socket.on('new_message', data => {
    if ((data.from === chatUser && data.to === currentUser) || (data.from === currentUser && data.to === chatUser)) {
        const div = document.createElement('div');
        div.className = data.from === currentUser ? 'message from-me' : 'message from-other';
        div.textContent = data.content;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
});

// Envoyer le message
btn.addEventListener('click', async () => {
    const text = input.value.trim();
    if(!text) return;
    const response = await fetch("/send_message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recipient: chatUser, message: text })
    });
    const result = await response.json();
    if(result.success){
        const div = document.createElement('div');
        div.className = 'message from-me';
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        input.value = '';
    } else alert("Impossible d'envoyer le message.");
});

// Enter pour envoyer
input.addEventListener('keypress', (e) => { if(e.key==='Enter'){ e.preventDefault(); btn.click(); } });
</script>
</body>
</html>
