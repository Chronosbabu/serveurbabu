<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat avec {{ chat_user }}</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; display:flex; flex-direction:column; height:100vh; }
.header { background:#007BFF; color:#fff; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
.messages { flex:1; overflow-y:auto; padding:15px; }
.message { margin-bottom:10px; padding:10px; border-radius:8px; max-width:70%; }
.from-me { background:#DCF8C6; margin-left:auto; }
.from-other { background:#fff; margin-right:auto; }
.input-box { display:flex; padding:10px; background:#fff; border-top:1px solid #ccc; }
.input-box input { flex:1; padding:10px; border:1px solid #ccc; border-radius:5px; margin-right:10px; }
.input-box button { padding:10px 15px; background:#007BFF; color:#fff; border:none; border-radius:5px; cursor:pointer; }
</style>
</head>
<body data-username="{{ session['username'] }}">
<div class="header">Chat avec {{ chat_user }}</div>
<div class="messages" id="messages">
    {% for msg in messages %}
    <div class="message {% if msg.sender == session['username'] %}from-me{% else %}from-other{% endif %}">
        {{ msg.text }}
    </div>
    {% else %}
    <p style="text-align:center; color:#555;">Aucun message pour le moment.</p>
    {% endfor %}
</div>
<div class="input-box">
    <input type="text" id="messageInput" placeholder="Écrire un message..." required>
    <button id="sendBtn">Envoyer</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const input = document.getElementById('messageInput');
const btn = document.getElementById('sendBtn');
const messagesDiv = document.getElementById('messages');
const currentUser = document.body.dataset.username;
const chatUser = "{{ chat_user }}";

// initialiser socket
const socket = io();

// recevoir les messages en temps réel
socket.on('new_message', data => {
    if ((data.from === chatUser && data.to === currentUser) || (data.from === currentUser && data.to === chatUser)) {
        const div = document.createElement('div');
        div.className = data.from === currentUser ? 'message from-me' : 'message from-other';
        div.textContent = data.content;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
});

// envoyer le message
btn.addEventListener('click', async () => {
    const text = input.value.trim();
    if(!text) return;

    const response = await fetch("/send_message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recipient: chatUser, message: text })
    });

    const result = await response.json();
    if(result.success){
        const div = document.createElement('div');
        div.className = 'message from-me';
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        input.value = '';
    } else alert("Impossible d'envoyer le message.");
});

input.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') { e.preventDefault(); btn.click(); }
});
</script>
</body>
</html>
