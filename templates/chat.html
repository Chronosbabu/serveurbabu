<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat avec {{ chat_user }}</title>
<link rel="stylesheet" href="/static/chat_conversations.css">
</head>
<body data-username="{{ session['username'] }}">
<div class="header">Chat avec {{ chat_user }}</div>
<div class="messages" id="messages">
    {% for msg in messages %}
    <div class="message {% if msg.sender == session['username'] %}from-me{% else %}from-other{% endif %}">
        {{ msg.text }}
    </div>
    {% else %}
    <p class="no-messages">Aucun message pour le moment.</p>
    {% endfor %}
</div>
<div class="input-box">
    <input type="text" id="messageInput" placeholder="Écrire un message..." required>
    <button id="sendBtn">Envoyer</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const input = document.getElementById('messageInput');
const btn = document.getElementById('sendBtn');
const messagesDiv = document.getElementById('messages');
const currentUser = document.body.dataset.username;
const chatUser = "{{ chat_user }}";

// initialiser socket
const socket = io();

// recevoir les messages en temps réel
socket.on('new_message', data => {
    if ((data.from === chatUser && data.to === currentUser) || (data.from === currentUser && data.to === chatUser)) {
        const div = document.createElement('div');
        div.className = data.from === currentUser ? 'message from-me' : 'message from-other';
        div.textContent = data.content;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
});

// envoyer le message
btn.addEventListener('click', async () => {
    const text = input.value.trim();
    if(!text) return;

    const response = await fetch("/send_message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recipient: chatUser, message: text })
    });

    const result = await response.json();
    if(result.success){
        const div = document.createElement('div');
        div.className = 'message from-me';
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        input.value = '';
    } else alert("Impossible d'envoyer le message.");
});

input.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') { e.preventDefault(); btn.click(); }
});
</script>
</body>
</html>
