<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chat avec {{ chat_user }}</title>
<style>
:root {
  --header-h: 60px;
  --input-min-h: 40px;
  --input-max-h: 120px;
}

/* Reset */
html, body {
  margin: 0;
  padding: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  height: 100%;
  background: #e5ddd5;
}

/* Conteneur principal */
.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Header fixe */
.header {
  height: var(--header-h);
  line-height: var(--header-h);
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  background: #075E54;
  color: #fff;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

/* Messages scrollables */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  -webkit-overflow-scrolling: touch;
}

/* Message individuel */
.message {
  padding: 10px 14px;
  border-radius: 20px;
  max-width: 75%;
  word-wrap: break-word;
}
.from-me { background: #dcf8c6; align-self: flex-end; }
.from-other { background: #fff; align-self: flex-start; }

/* Zone input */
.input-box {
  display: flex;
  padding: 8px 10px;
  background: #fff;
  gap: 8px;
  box-sizing: border-box;
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
}
.input-box textarea {
  flex: 1;
  padding: 10px;
  border-radius: 25px;
  border: 1px solid #ccc;
  font-size: 16px;
  resize: none;
  overflow-y: hidden;
  min-height: var(--input-min-h);
  max-height: var(--input-max-h);
}
.input-box button {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #25D366;
  color: #fff;
  border: none;
  font-size: 18px;
  cursor: pointer;
}
.input-box button:hover { background: #128C7E; }

/* Scrollbar optionnelle */
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
</style>
</head>
<body data-username="{{ session['username'] }}">
<div class="container">
  <div class="header">Chat avec {{ chat_user }}</div>

  <div class="messages" id="messages">
    {% for msg in messages %}
      <div class="message {% if msg.sender == session['username'] %}from-me{% else %}from-other{% endif %}">
        {{ msg.text }}
      </div>
    {% else %}
      <div class="message from-other">Aucun message pour le moment.</div>
    {% endfor %}
  </div>

  <div class="input-box">
    <textarea id="messageInput" placeholder="Écrire un message..." autocomplete="off"></textarea>
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const input = document.getElementById('messageInput');
const btn = document.getElementById('sendBtn');
const messagesDiv = document.getElementById('messages');
const chatUser = "{{ chat_user }}";

// Scroll automatique vers le bas
function scrollToBottom(){
  requestAnimationFrame(()=>{ messagesDiv.scrollTop = messagesDiv.scrollHeight; });
}
scrollToBottom();

// Ajuster la hauteur du textarea dynamiquement
function adjustInputHeight(){
  input.style.height = 'auto';
  const newHeight = Math.min(input.scrollHeight, 120);
  input.style.height = newHeight + 'px';
}
input.addEventListener('input', adjustInputHeight);

// Envoi de message
async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;
  input.focus();
  try {
    const res = await fetch('/send_message', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({recipient: chatUser, message: text})
    });
    const result = await res.json();
    if(result.success){
      const div = document.createElement('div');
      div.className = 'message from-me';
      div.textContent = text;
      messagesDiv.appendChild(div);
      input.value = '';
      adjustInputHeight();
      scrollToBottom();
    } else alert('Impossible d\'envoyer le message.');
  } catch(e){
    alert('Erreur réseau.');
  }
}

// Events
btn.addEventListener('click', sendMessage);
input.addEventListener('keypress', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });

adjustInputHeight();
</script>
</body>
</html>
