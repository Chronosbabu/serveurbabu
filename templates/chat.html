<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat</title>
<style>
  /* --- Reset de base --- */
  * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
  }

  body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #e5ddd5;
      overflow: hidden; /* empêche le body de défiler */
  }

  header {
      background: #075e54;
      color: white;
      padding: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
  }

  .messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
      margin-top: 52px; /* espace pour header fixe */
      margin-bottom: 60px; /* espace pour le footer fixe */
  }

  .message {
      background: #dcf8c6;
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 80%;
      align-self: flex-start;
      word-wrap: break-word;
  }

  .message.self {
      background: #fff;
      align-self: flex-end;
  }

  .input-box {
      display: flex;
      padding: 8px;
      background: #fff;
      border-top: 1px solid #ccc;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      gap: 8px;
      align-items: center;
    }

  .input-box textarea {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 20px;
      outline: none;
      font-size: 16px;
      resize: none; /* empêche le resize manuel */
      max-height: 120px; /* limite la taille avant scroll */
      overflow-y: auto;
    }

  .input-box button {
      padding: 10px 16px;
      background: #075e54;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
  }

  /* Scrollbar optionnelle pour mobile */
  .messages::-webkit-scrollbar {
      width: 6px;
  }
  .messages::-webkit-scrollbar-thumb {
      background-color: rgba(0,0,0,0.2);
      border-radius: 3px;
  }
</style>
</head>
<body>

<header>Nom du contact</header>

<div class="messages" id="messages">
  <!-- Les messages apparaissent ici -->
  <div class="message">Bonjour !</div>
  <div class="message self">Salut, ça va ?</div>
</div>

<div class="input-box">
  <textarea id="messageInput" placeholder="Écrire un message..." rows="1"></textarea>
  <button id="sendBtn">➤</button>
</div>

<script>
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  function addMessage(text, self = false) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message');
      if(self) msgDiv.classList.add('self');
      msgDiv.textContent = text;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight; // scroll automatique
  }

  sendBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if(text !== '') {
          addMessage(text, true);
          input.value = '';
          input.style.height = 'auto'; // reset taille
          // Ici tu peux ajouter l'envoi au serveur
      }
  });

  input.addEventListener('input', () => {
      input.style.height = 'auto'; // reset pour recalcul
      input.style.height = input.scrollHeight + 'px'; // ajuste la hauteur automatiquement
  });

  input.addEventListener('keypress', (e) => {
      if(e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault(); // empêche le saut de ligne
          sendBtn.click();
      }
  });
</script>

</body>
</html>
