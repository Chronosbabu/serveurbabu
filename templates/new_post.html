<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau Post</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 12px;
            resize: none;
            background: #fafafa;
            transition: border 0.2s;
        }

        textarea:focus {
            border-color: #007BFF;
            outline: none;
            background: #fff;
        }

        .file-input {
            display: block;
            width: 100%;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        input[type="file"] {
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fafafa;
            width: 100%;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                margin: 0;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            textarea {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Créer un nouveau post</h2>
        <form method="POST" action="/add_post" enctype="multipart/form-data">
            <textarea name="content" placeholder="Écris ton post ici..." required></textarea>
            <label class="file-input">
                <input type="file" name="media" accept="image/*,video/*">
            </label>
            <button type="submit">Publier</button>
        </form>
    </div>
</body>
</html>
