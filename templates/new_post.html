<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- IMPORTANT pour mobile -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 12px;
            resize: none;
            background: #fafafa;
        }

        textarea:focus {
            border-color: #007BFF;
            outline: none;
            background: #fff;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            margin-bottom: 12px;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fafafa;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        /* ✅ Mode mobile : la page occupe tout l’écran */
        @media (max-width: 600px) {
            body {
                align-items: stretch;
            }
            .container {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            textarea {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Créer un nouveau post</h2>
        <form method="POST" action="/add_post" enctype="multipart/form-data">
            <textarea name="content" placeholder="Écris ton post ici..." required></textarea>
            
            <!-- ✅ Autorise plusieurs fichiers -->
            <input type="file" name="media" accept="image/*,video/*" multiple>
            
            <button type="submit">Publier</button>
        </form>
    </div>
</body>
</html>
