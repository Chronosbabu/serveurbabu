<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte Bancaire</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        #balances {
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        #convert, #transfer {
            display: none;
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        #convert:hover, #transfer:hover {
            background: #00376b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Votre Compte Bancaire</h2>
        <div id="balances"></div>
        <div class="button-container">
            <button id="convert">Convertir</button>
            <button id="transfer">Transfert</button>
        </div>
    </div>
    <script>
        const socket = io();

        async function init() {
            let res = await fetch("/bank/status").then(r => r.json());
            if (res.error) {
                alert(res.error);
                return;
            }
            if (!res.exists) {
                let pwd = prompt("C'est votre première fois. Définissez un mot de passe pour votre compte bancaire:");
                if (!pwd) return;
                let referral_id = prompt("Entrez le numéro d'invitation (optionnel):") || "";
                let cr = await fetch("/bank/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: pwd, referral_id: referral_id })
                }).then(r => r.json());
                if (cr.success) {
                    alert("Compte créé avec succès. Votre ID de compte est: " + cr.account_id);
                } else {
                    alert(cr.error);
                    return;
                }
            }
            let logged = false;
            let balances, account_id;
            while (!logged) {
                let pwd = prompt("Entrez le mot de passe de votre compte bancaire:");
                if (!pwd) return;
                let lr = await fetch("/bank/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: pwd })
                }).then(r => r.json());
                if (lr.success) {
                    logged = true;
                    balances = lr.balances;
                    account_id = lr.account_id;
                    document.getElementById("balances").innerHTML = `ID: ${account_id} <br> Franc: ${balances.franc} <br> Dollar: ${balances.dollar}`;
                    document.getElementById("convert").style.display = "block";
                    document.getElementById("transfer").style.display = "block";
                } else {
                    alert("Mot de passe incorrect");
                }
            }

            // Convertir
            document.getElementById("convert").onclick = async () => {
                let choice = prompt("1. Franc \n2. Dollar");
                let currency = choice === "1" ? "franc" : choice === "2" ? "dollar" : null;
                if (!currency) return alert("Choix invalide");
                let am_str = prompt("Entrez le solde à convertir:");
                let amount = parseFloat(am_str);
                if (isNaN(amount) || amount <= 0) return alert("Montant invalide");
                if (balances[currency] < amount) return alert(`Solde insuffisant en ${currency}`);
                let phone = prompt("Entrez le numéro de téléphone où envoyer l'argent converti (Airtel ou Orange):");
                if (!phone || !/^(08|09)\d{8}$/.test(phone)) return alert("Numéro invalide");
                let cv = await fetch("/bank/convert", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ currency, amount, phone })
                }).then(r => r.json());
                if (cv.success) {
                    alert(cv.message);
                    balances[currency] -= amount;
                    document.getElementById("balances").innerHTML = `ID: ${account_id} <br> Franc: ${balances.franc} <br> Dollar: ${balances.dollar}`;
                } else {
                    alert(cv.error);
                }
            };

            // Transfert
            document.getElementById("transfer").onclick = async () => {
                let subCheck = await fetch("/bank/check_subscription").then(r => r.json());
                if (!subCheck.success) {
                    alert(subCheck.error);
                    return;
                }
                let recipient = prompt("Entrez le numéro de compte du bénéficiaire (01 suivi de 6 chiffres):");
                if (!recipient || !/^01\d{6}$/.test(recipient)) return alert("Numéro de compte invalide");
                let res = await fetch("/bank/get_username_by_id", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ account_id: recipient })
                }).then(r => r.json());
                if (!res.success) {
                    alert(res.error);
                    return;
                }
                let confirm = confirm(`Confirmez le transfert vers ${res.username} ?`);
                if (!confirm) return;
                let choice = prompt("1. Franc \n2. Dollar");
                let currency = choice === "1" ? "franc" : choice === "2" ? "dollar" : null;
                if (!currency) return alert("Choix invalide");
                let am_str = prompt("Entrez le montant à transférer:");
                let amount = parseFloat(am_str);
                if (isNaN(amount) || amount <= 0) return alert("Montant invalide");
                if (balances[currency] < amount) return alert(`Solde insuffisant en ${currency}`);
                let pwd = prompt("Entrez votre mot de passe bancaire:");
                if (!pwd) return;
                let tr = await fetch("/bank/transfer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ recipient_account_id: recipient, currency, amount, password: pwd })
                }).then(r => r.json());
                if (tr.success) {
                    alert(tr.message);
                    balances[currency] -= amount;
                    document.getElementById("balances").innerHTML = `ID: ${account_id} <br> Franc: ${balances.franc} <br> Dollar: ${balances.dollar}`;
                } else {
                    alert(tr.error);
                }
            };
        }

        socket.on('balance_updated', data => {
            document.getElementById("balances").innerHTML = `ID: ${data.account_id || ''} <br> Franc: ${data.balance_franc} <br> Dollar: ${data.balance_dollar}`;
        });

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
