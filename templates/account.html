<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte Bancaire</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        #balances {
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        #convert {
            display: none;
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        #convert:hover {
            background: #00376b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Votre Compte Bancaire</h2>
        <div id="balances"></div>
        <button id="convert">Convertir</button>
    </div>
    <script>
        const socket = io();

        async function init() {
            let res = await fetch("/bank/status").then(r => r.json());
            if (res.error) {
                alert(res.error);
                return;
            }
            if (!res.exists) {
                let pwd = prompt("C'est votre première fois. Définissez un mot de passe pour votre compte bancaire:");
                if (!pwd) return;
                let cr = await fetch("/bank/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: pwd })
                }).then(r => r.json());
                if (cr.success) {
                    alert("Compte créé avec succès");
                } else {
                    alert(cr.error);
                    return;
                }
            }
            let logged = false;
            while (!logged) {
                let pwd = prompt("Entrez le mot de passe de votre compte bancaire:");
                if (!pwd) return;
                let lr = await fetch("/bank/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: pwd })
                }).then(r => r.json());
                if (lr.success) {
                    logged = true;
                    let balances = lr.balances;
                    document.getElementById("balances").innerHTML = `Franc: ${balances.franc} <br> Dollar: ${balances.dollar}`;
                    let btn = document.getElementById("convert");
                    btn.style.display = "block";
                    btn.onclick = async () => {
                        let choice = prompt("1. Franc \n2. Dollar");
                        let currency = choice === "1" ? "franc" : choice === "2" ? "dollar" : null;
                        if (!currency) return alert("Choix invalide");
                        let am_str = prompt("Entrez le solde à convertir:");
                        let amount = parseFloat(am_str);
                        if (isNaN(amount) || amount <= 0) return alert("Montant invalide");
                        if (balances[currency] < amount) return alert(`Solde insuffisant en ${currency}`);
                        let phone = prompt("Entrez le numéro de téléphone où envoyer l'argent converti (Airtel ou Orange):");
                        if (!phone || !/^(08|09)\d{8}$/.test(phone)) return alert("Numéro invalide");
                        let cv = await fetch("/bank/convert", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ currency, amount, phone })
                        }).then(r => r.json());
                        if (cv.success) {
                            alert(cv.message);
                            balances[currency] -= amount;
                            document.getElementById("balances").innerHTML = `Franc: ${balances.franc} <br> Dollar: ${balances.dollar}`;
                        } else {
                            alert(cv.error);
                        }
                    };
                } else {
                    alert("Mot de passe incorrect");
                }
            }
        }

        socket.on('balance_updated', data => {
            document.getElementById("balances").innerHTML = `Franc: ${data.balance_franc} <br> Dollar: ${data.balance_dollar}`;
        });

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
