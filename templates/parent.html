
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Interface Parent - Suivi Enfant</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; max-width: 600px; }
    #container { display: flex; flex-direction: column; gap: 15px; }
    #entry-section { display: flex; gap: 10px; }
    #inputIdEnfant { flex-grow: 1; padding: 8px; font-size: 1em; }
    button { padding: 8px 15px; font-size: 1em; cursor: pointer; }
    #listeEnfants { max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 5px; display: flex; flex-direction: column; gap: 10px; }
    .btn-enfant { background-color: #007BFF; color: white; border: none; border-radius: 4px; padding: 8px 12px; cursor: pointer; text-align: left; }
    .btn-enfant:hover { background-color: #0056b3; }
    #chat-section { display: none; flex-direction: column; border: 1px solid #ccc; height: 400px; }
    #chat-header { background: #007BFF; color: white; padding: 10px; display: flex; align-items: center; gap: 15px; }
    #btnRetour { background: #0056b3; border: none; color: white; padding: 6px 12px; cursor: pointer; border-radius: 3px; font-weight: bold; }
    #chat-title { flex-grow: 1; text-align: center; font-weight: bold; font-size: 1.2em; }
    #messages { flex-grow: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; white-space: pre-wrap; font-size: 1em; }
  </style>
</head>
<body>
  <h1>Interface Parent - Suivi Enfant</h1>
  <div id="container">
    <div id="entry-section">
      <input type="text" id="inputIdEnfant" placeholder="Entrer l'ID de l'enfant (ex : ENFANT001)" />
      <button id="btnValiderId">Valider</button>
    </div>

    <div>
      <strong>Enfants validés :</strong>
      <div id="listeEnfants"></div>
    </div>

    <div id="chat-section">
      <div id="chat-header">
        <button id="btnRetour">← Retour</button>
        <div id="chat-title">Nom Enfant (ID)</div>
      </div>
      <div id="messages"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>
  <script>
    const socket = io();
    const inputIdEnfant = document.getElementById('inputIdEnfant');
    const btnValiderId = document.getElementById('btnValiderId');
    const listeEnfants = document.getElementById('listeEnfants');
    const chatSection = document.getElementById('chat-section');
    const chatTitle = document.getElementById('chat-title');
    const messagesDiv = document.getElementById('messages');
    const btnRetour = document.getElementById('btnRetour');

    const enfantsValides = {};
    const messagesParEnfant = {};
    let enfantSelectionne = null;

    btnValiderId.addEventListener('click', async () => {
      const id = inputIdEnfant.value.trim().toUpperCase();
      if (!id) return alert("Merci d'entrer l'ID de l'enfant.");
      if (enfantsValides[id]) return alert("Cet enfant est déjà ajouté.");

      try {
        const res = await fetch('/api/chercher_enfant', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });

        if (!res.ok) throw new Error();
        const data = await res.json();

        enfantsValides[id] = data.nom;
        ajouterBoutonEnfant(id, data.nom);
        inputIdEnfant.value = '';
      } catch {
        alert("ID enfant invalide ou introuvable.");
      }
    });

    function ajouterBoutonEnfant(id, nom) {
      const btn = document.createElement('button');
      btn.textContent = `${nom} (${id})`;
      btn.classList.add('btn-enfant');
      btn.addEventListener('click', () => ouvrirChat(id));
      listeEnfants.appendChild(btn);
    }

    function ouvrirChat(id) {
      enfantSelectionne = id;
      chatTitle.textContent = `${enfantsValides[id]} (${id})`;
      afficherMessages(id);
      chatSection.style.display = 'flex';
    }

    btnRetour.addEventListener('click', () => {
      enfantSelectionne = null;
      chatSection.style.display = 'none';
      messagesDiv.innerHTML = '';
    });

    function afficherMessages(id) {
      messagesDiv.innerHTML = '';
      (messagesParEnfant[id] || []).forEach(msg => {
        const p = document.createElement('p');
        p.textContent = `[${msg.emetteur}] ${msg.message}`;
        messagesDiv.appendChild(p);
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    socket.on('nouveau_message', data => {
      if (!data.id_enfant || !data.message) return;
      const id = data.id_enfant;
      const msg = data.message;
      const emetteur = data.emetteur || 'école';
      if (!messagesParEnfant[id]) messagesParEnfant[id] = [];
      messagesParEnfant[id].push({ emetteur, message: msg });
      if (id === enfantSelectionne) afficherMessages(id);
    });
  </script>
</body>
</html>
