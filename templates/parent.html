<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>Interface Parent - Suivi Enfant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px auto;
      max-width: 600px;
      box-sizing: border-box;
      padding: 0 10px;
    }
    #container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      position: relative;
    }
    #entry-section {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    #inputIdEnfant {
      flex-grow: 1;
      padding: 8px;
      font-size: 1em;
      min-width: 150px;
      box-sizing: border-box;
    }
    button {
      padding: 8px 15px;
      font-size: 1em;
      cursor: pointer;
      flex-shrink: 0;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
    #listeEnfants {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 5px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-enfant {
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
    }
    .btn-enfant:hover {
      background-color: #0056b3;
    }
    #chat-section {
      display: none;
      flex-direction: column;
      border: 1px solid #ccc;
      padding: 0;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      position: fixed;
      top: 0;
      left: 0;
      background: white;
      z-index: 1000;
    }
    #chat-header {
      background: #007BFF;
      color: white;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    #btnRetour {
      background: #0056b3;
      border: none;
      color: white;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 3px;
      font-weight: bold;
    }
    #chat-title {
      flex-grow: 1;
      text-align: center;
      font-weight: bold;
      font-size: 1.2em;
      user-select: none;
    }
    #messages {
      flex-grow: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f9f9f9;
      white-space: pre-wrap;
      font-size: 1em;
    }
    #container.chat-ouvert > :not(#chat-section) {
      opacity: 0.3;
      pointer-events: none;
      user-select: none;
    }
    @media (max-width: 480px) {
      #entry-section {
        flex-direction: column;
      }
      button {
        width: 100%;
      }
      #chat-section {
        height: 100vh;
        max-width: 100vw;
      }
      #messages {
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>
  <h1>Interface Parent - Suivi Enfant</h1>
  <div id="container">
    <div id="entry-section">
      <input type="text" id="inputIdEnfant" placeholder="Entrer l'ID de l'enfant (ex : ENFANT001)" />
      <button id="btnValiderId">Valider</button>
    </div>

    <div>
      <strong>Enfants validés :</strong>
      <div id="listeEnfants"></div>
    </div>

    <div id="chat-section">
      <div id="chat-header">
        <button id="btnRetour">← Retour</button>
        <div id="chat-title">Nom Enfant (ID)</div>
      </div>
      <div id="messages"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>
  <script>
    const socket = io();

    const inputIdEnfant = document.getElementById('inputIdEnfant');
    const btnValiderId = document.getElementById('btnValiderId');
    const listeEnfants = document.getElementById('listeEnfants');

    const chatSection = document.getElementById('chat-section');
    const chatTitle = document.getElementById('chat-title');
    const messagesDiv = document.getElementById('messages');
    const btnRetour = document.getElementById('btnRetour');
    const container = document.getElementById('container');

    const enfantsValides = {};
    const messagesParEnfant = {};
    let enfantSelectionne = null;

    btnValiderId.addEventListener('click', () => {
      const id = inputIdEnfant.value.trim().toUpperCase();
      if (!id) {
        alert("Merci d'entrer l'ID de l'enfant.");
        return;
      }
      if (enfantsValides[id]) {
        alert("Cet enfant est déjà ajouté.");
        inputIdEnfant.value = '';
        return;
      }

      fetch('/api/chercher_enfant', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      })
      .then(res => {
        if (!res.ok) throw new Error("Enfant non trouvé");
        return res.json();
      })
      .then(data => {
        enfantsValides[id] = data.nom;
        ajouterBoutonEnfant(id, data.nom);
        inputIdEnfant.value = '';
      })
      .catch(() => alert("ID enfant invalide ou introuvable."));
    });

    function ajouterBoutonEnfant(id, nom) {
      const btn = document.createElement('button');
      btn.textContent = `${nom} (${id})`;
      btn.classList.add('btn-enfant');
      btn.addEventListener('click', () => {
        ouvrirChat(id);
      });
      listeEnfants.appendChild(btn);
    }

    function ouvrirChat(id) {
      enfantSelectionne = id;
      chatTitle.textContent = `${enfantsValides[id]} (${id})`;
      afficherMessages(id);
      chatSection.style.display = 'flex';
      window.scrollTo(0, 0);
      container.classList.add('chat-ouvert');
      // Ajouter un état dans l'historique pour intercepter bouton retour physique
      history.pushState({ chatOpen: true }, "");
    }

    btnRetour.addEventListener('click', () => {
      fermerChat();
      // Retirer l'état de l'historique
      history.back();
    });

    // Fonction pour fermer la fenêtre chat
    function fermerChat() {
      enfantSelectionne = null;
      chatSection.style.display = 'none';
      messagesDiv.innerHTML = '';
      container.classList.remove('chat-ouvert');
    }

    function afficherMessages(id) {
      messagesDiv.innerHTML = '';
      if (!messagesParEnfant[id]) messagesParEnfant[id] = [];
      messagesParEnfant[id].forEach(msg => {
        const p = document.createElement('p');
        p.textContent = `[${msg.emetteur}] ${msg.message}`;
        messagesDiv.appendChild(p);
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Gestion du bouton physique retour (Android, etc.)
    window.addEventListener('popstate', function(event) {
      if (event.state && event.state.chatOpen) {
        // On est en chat, fermer la fenêtre chat au lieu de revenir en arrière dans l'historique
        fermerChat();
      }
    });

    // Réception messages serveur
    socket.on('nouveau_message', data => {
      if (!data.id_enfant || !data.message) return;
      const id = data.id_enfant;
      const msg = data.message;
      const emetteur = data.emetteur || 'école';

      if (!messagesParEnfant[id]) messagesParEnfant[id] = [];
      messagesParEnfant[id].push({ emetteur, message: msg });

      if (id === enfantSelectionne) {
        afficherMessages(id);
      }
    });
  </script>
</body>
</html>
