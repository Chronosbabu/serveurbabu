<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Interface École</title>
  <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>
  <script src="/static/js/main_ecole.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .inscription {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .inscription input {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      flex: 1;
    }

    .inscription button {
      padding: 10px 20px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .inscription button:hover {
      background: #0056b3;
    }

    #listeEnfants {
      list-style: none;
      padding: 0;
    }

    .enfant-btn {
      display: block;
      background: white;
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .enfant-btn:hover {
      background: #e9f3ff;
    }

    .enfant-id {
      display: block;
      font-size: 12px;
      color: #777;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Gestion des enfants</h1>

  <!-- Barre d'inscription -->
  <div class="inscription">
    <input type="text" id="nomEnfant" placeholder="Nom de l'enfant" />
    <button id="btnInscrire">Inscrire</button>
  </div>

  <!-- Liste des enfants -->
  <ul id="listeEnfants"></ul>

  <script>
    // Ici, le JS existant main_ecole.js gère la logique
    // On ajoute juste l'ouverture de boîte de dialogue au clic sur un enfant
    document.addEventListener("click", function(e) {
      if (e.target.classList.contains("enfant-btn")) {
        const id = e.target.dataset.id;
        const nom = e.target.dataset.nom;
        const message = prompt(`Message pour ${nom} :`);
        if (message && message.trim() !== "") {
          // On utilise l'événement Socket.IO déjà prévu dans ton JS
          socket.emit('envoyer_message', { id_enfant: id, message: message.trim() });
        }
      }
    });
  </script>
</body>
</html>
