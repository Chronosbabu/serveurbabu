<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Interface École</title>
  <!-- Chargement de Socket.IO depuis le CDN -->
  <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"
    integrity="sha384-lQhtCtEr5eZbAVgA5m+3PLD5DQo7bGxu5rrtHPqZEqF0tgT04LoyqUBXqN9R24Hl"
    crossorigin="anonymous"></script>
  <!-- Ton script principal -->
  <script src="/static/js/main_ecole.js"></script>
</head>
<body>
  <h1>Inscrire un enfant</h1>
  <input type="text" id="nomEnfant" placeholder="Nom de l'enfant" />
  <button id="btnInscrire">Inscrire</button>

  <h2>Enfants inscrits</h2>
  <ul id="listeEnfants"></ul>

  <hr />

  <h2>Envoyer un message</h2>
  <select id="selectEnfant">
    <option value="">-- Choisir un enfant --</option>
  </select><br/><br/>

  <textarea id="inputMessage" placeholder="Écrire un message..."></textarea><br/>
  <button id="btnEnvoyerMessage">Envoyer</button>

  <h3>Messages reçus</h3>
  <div id="messages" style="border:1px solid #ccc; padding:10px; height:150px; overflow-y:auto;"></div>
</body>
</html>
